services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: toolkit
      POSTGRES_USER: toolkit
      POSTGRES_PASSWORD: toolkit
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolkit -d toolkit"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://toolkit:toolkit@postgres:5432/toolkit
      SEED_ON_STARTUP: "true"
      API_KEYS: admin-key:admin:platform-admin,analyst-key:analyst:reconciliation-analyst,integration-key:integration:dashboard-integration
      CURRENT_SCHEMA_VERSION: 2025-02-01
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
